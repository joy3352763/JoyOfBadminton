name: CI — Build & Test

# ✅ 自動觸發時機
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Xcode 版本確認：請執行 `xcode-select -p` 檢查本機預設版本，
      # 如需切換請更改下方路徑。
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app
        # 在 GitHub Actions 輸出中可檢查可用版本：
        # ls /Applications/ | grep Xcode

      # ❗ TODO: 確認以下兩項設定是否正確。
      #
      #   PROJECT_PATH — 相對 repo 根目錄的 .xcodeproj 路徑。
      #     目前設定： BadmintonScorer/BadmintonScorer.xcodeproj
      #     確認方法：在 Xcode 中檢查 Navigator 的 .xcodeproj 名稱
      #
      #   SCHEME — Xcode scheme 名稱。
      #     目前設定： BadmintonScorer
      #     確認方法： Xcode 工具列左上角 scheme 下拉選單，
      #               或 `xcodebuild -list` 查看所有 scheme

      - name: Build
        env:
          PROJECT_PATH: BadmintonScorer/BadmintonScorer.xcodeproj  # ❗ 待確認
          SCHEME: BadmintonScorer                                  # ❗ 待確認
        run: |
          xcodebuild build \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild build \
                -project "$PROJECT_PATH" \
                -scheme "$SCHEME" \
                -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
                CODE_SIGNING_ALLOWED=NO

      - name: Test
        env:
          PROJECT_PATH: BadmintonScorer/BadmintonScorer.xcodeproj  # ❗ 待確認
          SCHEME: BadmintonScorer                                  # ❗ 待確認
        run: |
          xcodebuild test \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild test \
                -project "$PROJECT_PATH" \
                -scheme "$SCHEME" \
                -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
                CODE_SIGNING_ALLOWED=NO
